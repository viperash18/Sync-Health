{% extends "base.html" %}
{% block title %} · Book{% endblock %}
{% block content %}
<h1>Book an appointment</h1>
<form class="stack" method="post">
  <div>
    <label>Doctor</label>
    <select name="doctor_id" required
            hx-get="{{ url_for('patient.slots_fragment') }}"
            hx-trigger="change"
            hx-target="#slots"
            hx-include="[name='appt_date']">
      <option value="">— choose a doctor —</option>
      {% for d in doctors %}
        <option value="{{ d.id }}">{{ d.name }} — {{ d.specialization }} (Room {{ d.room }})</option>
      {% endfor %}
    </select>
  </div>

  <div>
    <label>Date</label>
    <input type="date" name="appt_date" value="{{ today }}" min="{{ today }}" required
           hx-get="{{ url_for('patient.slots_fragment') }}"
           hx-trigger="change"
           hx-target="#slots"
           hx-include="[name='doctor_id']">
  </div>

  <div>
    <label>Available times</label>
    <div id="slots"><p class="muted">Choose a doctor and date to see free slots.</p></div>
  </div>

  <div><label>Reason (optional)</label><input type="text" name="reason" placeholder="e.g. follow-up"></div>
  <button type="submit">Book appointment</button>
</form>
{% endblock %}
