{% extends "base.html" %}
{% block title %} · Front Desk{% endblock %}
{% block content %}
<h1>Front desk</h1>

<div class="card">
  <h2 style="margin-top:0">Register &amp; book</h2>
  <form class="stack" method="post" action="{{ url_for('reception.book') }}">
    <div class="row" style="gap:0.5rem">
      <div style="flex:1"><label>Patient name</label><input type="text" name="name" required></div>
      <div style="flex:1"><label>Phone</label><input type="tel" name="phone" required></div>
    </div>
    <div class="row" style="gap:0.5rem">
      <div style="width:90px"><label>Age</label><input type="number" name="age" min="0"></div>
      <div style="flex:1"><label>Gender</label>
        <select name="gender"><option value="">—</option><option>male</option><option>female</option><option>other</option></select>
      </div>
    </div>
    <div>
      <label>Doctor</label>
      <select name="doctor_id" required
              hx-get="{{ url_for('reception.slots_fragment') }}" hx-trigger="change"
              hx-target="#slots" hx-include="[name='appt_date']">
        <option value="">— choose a doctor —</option>
        {% for d in doctors %}<option value="{{ d.id }}">{{ d.name }} — {{ d.specialization }}</option>{% endfor %}
      </select>
    </div>
    <div>
      <label>Date</label>
      <input type="date" name="appt_date" value="{{ day }}" min="{{ today }}" required
             hx-get="{{ url_for('reception.slots_fragment') }}" hx-trigger="change"
             hx-target="#slots" hx-include="[name='doctor_id']">
    </div>
    <div><label>Available times</label><div id="slots"><p class="muted">Pick a doctor and date.</p></div></div>
    <div><label>Reason (optional)</label><input type="text" name="reason"></div>
    <button type="submit">Book</button>
  </form>
</div>

<div class="row">
  <h2>Schedule</h2>
  <form method="get" class="inline-form">
    <input type="date" name="day" value="{{ day }}" onchange="this.form.submit()">
    <noscript><button type="submit">Show</button></noscript>
  </form>
</div>
<div id="board" hx-get="{{ url_for('reception.board_fragment', day=day) }}" hx-trigger="every 4s" hx-swap="innerHTML">
  {% include "partials/reception_board.html" %}
</div>
{% endblock %}
